# =============================================================================
# Daily Audit — ATS Recap Report Builder
# =============================================================================
# Runs every morning at 7:00 AM EST on GitHub's servers (laptop can be off).
# Creates a GitHub Issue with the audit report — GitHub emails you automatically.
#
# NO SECRETS OR PASSWORDS NEEDED — just push this file and it works.
#
# To get email notifications:
#   1. Go to github.com → Settings → Notifications
#   2. Make sure "Issues" notifications are ON for this repo
# =============================================================================

name: Daily Audit

on:
  schedule:
    # 7:00 AM EST = 12:00 PM UTC
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Manual trigger from Actions tab anytime

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Audit & Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run audit
        id: audit
        continue-on-error: true
        run: python scripts/audit.py

      - name: Create GitHub Issue with report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toLocaleDateString('en-US', {
              timeZone: 'America/New_York',
              year: 'numeric', month: 'long', day: 'numeric'
            });

            let report = '';
            try {
              report = fs.readFileSync('audit-report.md', 'utf8');
            } catch (e) {
              report = '⚠️ Audit script did not produce a report. Check the [workflow logs](' +
                `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;
            }

            const passed = '${{ steps.audit.outcome }}' === 'success';
            const emoji = passed ? '✅' : '🚨';
            const status = passed ? 'All Checks Passed' : 'Issues Found';
            const title = `${emoji} Daily Audit — ${date} — ${status}`;

            const labels = passed ? ['audit', 'passed'] : ['audit', 'action-needed'];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: report,
              labels: labels
            });
